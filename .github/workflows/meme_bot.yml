name: meme-bot

on:
  schedule:
    # IST -> UTC (IST = UTC+5:30): 08:00 / 11:00 / 13:00 / 16:00 / 19:00 / 21:00 IST
    # (morning, late-morning, lunch, afternoon, evening prime-time, night)
    - cron: "30 2 * * *"
    - cron: "30 5 * * *"
    - cron: "30 7 * * *"
    - cron: "30 10 * * *"
    - cron: "30 13 * * *"
    - cron: "30 15 * * *"
  workflow_dispatch: {}      # manual "Run workflow" button for testing

permissions:
  contents: write            # commit generated memes back to the repo

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Hugging Face model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-distilbart-cnn-12-6

      - name: Install dependencies
        run: |
          pip install pillow ddgs requests opencv-python-headless numpy fonttools
          pip install trafilatura lxml_html_clean
          # PyTorch's CDN occasionally has a transient TLS/connection blip -
          # retry a few times before failing the whole run over it.
          for i in 1 2 3; do
            pip install torch --index-url https://download.pytorch.org/whl/cpu && break
            echo "torch install failed (attempt $i/3), retrying in 15s..."
            sleep 15
          done
          pip install transformers

      - name: Generate meme
        run: python auto_meme.py

      - name: Commit meme + dedupe state
        run: |
          git config user.name "meme-bot"
          git config user.email "actions@github.com"
          git add Generated_Memes data/used_headlines.json
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "auto meme $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase origin main
          git push

      - name: Publish to Instagram
        if: success()
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: python instagram_publisher.py
